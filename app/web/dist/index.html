<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fluid Lab — Phase 0.1 shell</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0a0c10; color: #cdd6e4;
        font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      #app { position: fixed; inset: 0; display: flex; flex-direction: column; }
      #toolbar { display: flex; gap: 8px; align-items: center; padding: 8px 12px;
        background: #11141b; border-bottom: 1px solid #1d2230; user-select: none; }
      #toolbar button { background: #1b2130; color: #cdd6e4; border: 1px solid #2a3142;
        padding: 5px 12px; border-radius: 5px; cursor: pointer; }
      #toolbar button:hover { background: #232b3d; }
      #toolbar .spacer { flex: 1; }
      #toolbar .hint { color: #6b7689; }
      #stage { position: relative; flex: 1; min-height: 0; }
      canvas { display: block; width: 100%; height: 100%; touch-action: none; }
      /* Left/right placeholders exist for the 1.2 rendered panels; empty in 0.1. */
      .panel-placeholder { position: absolute; top: 0; bottom: 0; width: 0;
        pointer-events: none; }
      #unsupported { position: fixed; inset: 0; display: none; place-items: center;
        background: #0a0c10; padding: 24px; }
      #unsupported .card { max-width: 560px; background: #11141b;
        border: 1px solid #2a3142; border-radius: 10px; padding: 24px; }
      #unsupported h1 { margin: 0 0 12px; font-size: 18px; color: #f0f4fa; }
      #unsupported code { color: #8fd0ff; }
    </style>
    <script type="module" crossorigin src="/assets/index-DwGmCxei.js"></script>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <strong>Fluid Lab</strong>
        <span class="hint">Phase 0.1 shell</span>
        <button id="btn-pause">Pause</button>
        <button id="btn-step">Step</button>
        <button id="btn-reset">Reset</button>
        <span class="spacer"></span>
        <span class="hint">drag = orbit · wheel = zoom · console = diagnostics</span>
      </div>
      <div id="stage">
        <div class="panel-placeholder" style="left:0"></div>
        <canvas id="gpu-canvas"></canvas>
        <div class="panel-placeholder" style="right:0"></div>
      </div>
    </div>

    <div id="unsupported">
      <div class="card">
        <h1>WebGPU is not available</h1>
        <p>This fluid lab needs a browser with WebGPU enabled (recent Chrome, Edge,
           or Chromium with <code>navigator.gpu</code>).</p>
        <p id="unsupported-detail" class="hint"></p>
      </div>
    </div>

  </body>
</html>
